spring:
  application:
    name: flight-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flightdb}
    username: ${DB_USER:flight_user}
    password: ${DB_PASS:flight_pass}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics